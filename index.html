<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri Lanka - FL at a Glance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#050508;color:#f0f0ff;min-height:100vh;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',monospace}
.card{background:#0d0d14;border:1px solid rgba(255,255,255,0.06);border-radius:8px}
.accent{color:#06b6d4}
.accent-bg{background:rgba(6,182,212,0.08);border:1px solid rgba(6,182,212,0.2)}
.muted{color:#6b7280}
.subtle{color:#9ca3af}
.dim{color:rgba(240,240,255,0.5)}
.nav-item{transition:all 0.15s;cursor:pointer;border-left:2px solid transparent}
.nav-item:hover{background:rgba(255,255,255,0.03);border-left-color:rgba(6,182,212,0.3)}
.nav-item.active{background:rgba(6,182,212,0.06);border-left-color:#06b6d4;color:#06b6d4}
.pill{transition:all 0.12s;cursor:pointer;background:transparent;border:1px solid rgba(255,255,255,0.08);color:#6b7280}
.pill:hover{background:rgba(255,255,255,0.04)}
.pill.active{background:rgba(6,182,212,0.1);border-color:rgba(6,182,212,0.4);color:#06b6d4}
.expand-btn{cursor:pointer;transition:all 0.12s}
.expand-btn:hover{background:rgba(255,255,255,0.03)}
.tag-tax{background:rgba(234,179,8,0.1);color:#eab308;border:1px solid rgba(234,179,8,0.2)}
.tag-acct{background:rgba(16,185,129,0.1);color:#10b981;border:1px solid rgba(16,185,129,0.2)}
.tag-config{background:rgba(59,130,246,0.1);color:#3b82f6;border:1px solid rgba(59,130,246,0.2)}
.warn-card{background:rgba(234,179,8,0.06);border:1px solid rgba(234,179,8,0.15)}
.tier-1{background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.15)}
.tier-2{background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.15)}
.tier-3{background:rgba(168,85,247,0.06);border:1px solid rgba(168,85,247,0.15)}
.tier-4{background:rgba(244,63,94,0.06);border:1px solid rgba(244,63,94,0.15)}
.info-card{background:rgba(6,182,212,0.06);border:1px solid rgba(6,182,212,0.15)}
.init-blue{background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.15)}
.init-green{background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.15)}
.init-purple{background:rgba(168,85,247,0.06);border:1px solid rgba(168,85,247,0.15)}
input[type="text"]{background:#0d0d14;border:1px solid rgba(255,255,255,0.08);color:#f0f0ff}
input[type="text"]:focus{border-color:rgba(6,182,212,0.4);outline:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.acr{position:relative;border-bottom:1px dotted rgba(6,182,212,0.4);color:#06b6d4;cursor:help}
.acr .acr-tip{visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 8px);left:0;background:#12121e;border:1px solid rgba(6,182,212,0.3);border-radius:6px;padding:8px 12px;font-size:11px;line-height:1.5;color:#9ca3af;white-space:normal;width:280px;z-index:999;pointer-events:none;transition:opacity 0.15s;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.acr .acr-tip strong{color:#06b6d4;display:block;margin-bottom:2px;font-size:12px}
.acr:hover .acr-tip{visibility:visible;opacity:1}
.stat-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:12px 16px}
.dept-border{border-left:2px solid;padding-left:12px;margin-bottom:16px}
.step-badge{font-size:10px;padding:2px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;letter-spacing:0.05em}
.inner-card{background:rgba(255,255,255,0.02);border-radius:6px;padding:10px 14px;margin-bottom:6px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const C = {cyan:"#06b6d4",blue:"#3b82f6",green:"#10b981",amber:"#eab308",red:"#f43f5e",purple:"#a855f7",orange:"#f97316"};
const onboardingSections = [
  {id:"strategy",label:"\u{1F680} What's next",highlight:true,content:()=>(<div><div className="info-card" style={{borderRadius:8,padding:"14px 18px",marginBottom:16,borderColor:"rgba(6,182,212,0.3)"}}><div style={{fontSize:13,color:"#06b6d4",lineHeight:"1.7"}}>Ran has proposed <strong>3 automation initiatives</strong> that would fundamentally shift how the fulfillment operation works — reducing dependency on the ~45-person Sri Lanka team by automating the most labor-intensive, repetitive workflows. All three share the same thesis: <strong>shift the FL team from doing the work to overseeing automated systems that do the work.</strong></div></div><div className="card" style={{padding:"14px 18px",marginBottom:16}}><div style={{fontSize:12,fontWeight:500,color:"#f0f0ff",marginBottom:8}}>Why these 3 areas?</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}><div className="stat-card" style={{padding:10}}><div className="mono" style={{fontSize:9,color:C.blue,letterSpacing:"0.05em"}}>INCORPORATION</div><div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>Highest-volume config workflow (~1,400/yr)</div></div><div className="stat-card" style={{padding:10}}><div className="mono" style={{fontSize:9,color:C.green,letterSpacing:"0.05em"}}>BOOKS REVIEW</div><div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>Largest team by headcount (29-33 people)</div></div><div className="stat-card" style={{padding:10}}><div className="mono" style={{fontSize:9,color:C.purple,letterSpacing:"0.05em"}}>NOTICE HANDLING</div><div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>Most complex cross-team pipeline (12 stages)</div></div></div><div style={{fontSize:12,color:"#6b7280",marginTop:10,lineHeight:"1.6"}}>If all three succeed, the operation can handle the same or higher volume with significantly fewer fulfillment personnel — shifting gsk's model from offshore labor scaling to automation-first.</div></div>{[{n:"1. Incorporation Automation",o:"Camille",cls:"init-blue",c:C.blue,today:"Nawanjana's config team (~5 people) manually submits ~1,400 incorporations/yr through IncFile/MyCorp — filling out forms, verifying entity names at SOS, checking addresses, shuffling documents into ShareFile. When info is missing, the Lettuce US team manually follows up with customers via email, tracks in Excel, and follows up within 48hrs.",think:"This is attacking the highest-volume config workflow. 1,400 incorporations × multiple manual touchpoints per filing = massive labor sink. If you can automate the data flow from customer intake (FFM/Lettuce Summary) → filing service (Bizee) → document storage, you eliminate a huge chunk of manual work.",planned:[{l:"a) Automate the Bizee online setup flow",d:"Bizee appears to be a new/replacement incorporation service (like IncFile). Instead of FL staff manually filling out forms on the dashboard, automate as much of the submission as possible. This directly reduces Nawanjana's SL config team headcount needs."},{l:"b) Automate follow-ups",d:"When info is missing, automate customer contact instead of manual follow-up by the Lettuce US team. Reduces US-side CS personnel needs (separate from the SL fulfillment headcount reduction in 1a). So this initiative targets both sides of the operation."}]},{n:"2. Books Review Automation",o:"Brad",cls:"init-green",c:C.green,today:"Harsha's accounting team of 29-33 people manually reviews every customer's P&L (income verification, expense verification, payroll verification), balance sheet (bank accounts, fixed assets, capital stock, retained earnings, distributions), and does vendor dedup and tax payment checks. The BOB ratio target is 75 accounts per bookkeeper.",think:"This is attacking the largest department by headcount. If you can automate the review checklist, you could dramatically increase the BOB ratio beyond 75 — maybe to 150-200+ per bookkeeper. The second part (product changes) is about prevention vs. detection, which is a more durable solution.",planned:[{l:"a) Automate the review, rules, and output",d:"Instead of bookkeepers manually checking every P&L line item ('is this income or a shareholder contribution?', 'is this vendor duplicated?', 'does retained earnings match last year's 1120S?'), build rules-based automation that does it. This is where Hurdlr's automated categorization was supposed to help, but Ran is pushing further."},{l:"b) Recommend product changes to reduce drift",d:"This is the more strategic piece. Today the books drift from expected rules because the product (FFM/Hurdlr) doesn't enforce enough constraints at the point of data entry. Brad should identify where product changes would prevent errors upstream rather than catching them in review. Prevention vs. detection."}]},{n:"3. Notice Handling Automation",o:"Camille",cls:"init-purple",c:C.purple,today:"The PRO Notice Pipeline has 12 manual stages. Notices come in via customer uploads or the Stable mailbox, get manually triaged by the FL team, and route through multiple escalation stages (Calsavers, Back to SL, Escalated to Pro, Escalated to Agency, etc.). M1-M4 milestones are already planned for intake automation.",think:"This accelerates the M1-M4 roadmap already documented. M1 (webhook automation) is about intake; Ran is pushing further into M2 (automated screening) and beyond — actually resolving notices, not just classifying them.",planned:[{l:"a) Automate classification into tiers",d:"Instead of FL staff manually reading each notice and deciding importance/tier, build automated classification. Some notices are urgent (IRS penalties), some routine (annual renewals), some informational."},{l:"b) Automate handling of simple notice types",d:"Many notices probably have standard resolution paths. If you can identify which types don't need human judgment, auto-resolve them without FL personnel touching them at all. Moves from just classifying (M2) to actually resolving notices."}]}].map((init,i)=>(<div key={i} className={init.cls} style={{borderRadius:8,padding:16,marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}><span style={{fontWeight:500,fontSize:14,color:init.c}}>{init.n}</span><span className="step-badge" style={{color:init.c,border:"1px solid "+init.c+"33",background:init.c+"1a"}}>Owner: {init.o}</span></div><div style={{fontSize:12,color:"#9ca3af",marginBottom:10,lineHeight:"1.6"}}><strong style={{color:"#f0f0ff"}}>Today:</strong> {init.today}</div>{init.planned.map((p,j)=>(<div key={j} className="inner-card"><div style={{fontSize:12,fontWeight:500,color:init.c,marginBottom:3}}>{p.l}</div><div style={{fontSize:12,color:"#9ca3af",lineHeight:"1.6"}}>{p.d}</div></div>))}<div style={{marginTop:8,padding:"10px 14px",background:"rgba(255,255,255,0.02)",borderRadius:6,fontSize:12,color:"#6b7280",lineHeight:"1.6"}}><strong style={{color:"#9ca3af"}}>How to think about it:</strong> {init.think}</div></div>))}<div className="warn-card" style={{borderRadius:8,padding:"12px 16px",fontSize:12,color:"#eab308",lineHeight:"1.6"}}><strong>Open questions for kick-off:</strong> <span style={{color:"#9ca3af"}}>Who is Brad? He's not in any FL docs — new hire or US-side product/eng? · Is Bizee replacing IncFile as the incorporation vendor? · What's the timeline expectation? These are significant engineering efforts. · How does this relate to the existing M1-M4 milestones on the PRO Notice Pipeline? · Does "minimize fulfillment personnel" mean reduction, redeployment, or just not needing to hire as volume grows?</span></div></div>)},
  {id:"overview",label:"The big picture",content:()=>(<div><p style={{color:"#9ca3af",fontSize:14,lineHeight:"1.7",marginBottom:16}}>Formations (now Lettuce) provides <strong style={{color:"#f0f0ff"}}>S-Corp formation, bookkeeping, payroll, and tax services</strong> to US small business owners. The fulfillment engine is a team in <strong style={{color:"#f0f0ff"}}>Sri Lanka (gsk)</strong> handling the actual work, while a smaller US team manages escalations and client relationships.</p><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>{[{l:"Sri Lanka (FL)",v:"~45 staff",s:"Config, Accounting, Tax, Support"},{l:"US Team",v:"~10 staff",s:"CSMs, Escalations, Sales"},{l:"Customers",v:"2,300+",s:"S-Corps, LLCs, Sole Props"},{l:"Products",v:"4 tiers",s:"Platinum, Standard, Digital, BIB"}].map((c,i)=>(<div key={i} className="stat-card"><div className="mono" style={{fontSize:10,color:"#6b7280",letterSpacing:"0.05em",textTransform:"uppercase"}}>{c.l}</div><div style={{fontSize:22,fontWeight:500,marginTop:4}}>{c.v}</div><div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{c.s}</div></div>))}</div><div className="info-card" style={{borderRadius:8,padding:"12px 16px",fontSize:13,color:"#06b6d4"}}><strong>Key context:</strong> <span style={{color:"#9ca3af"}}>gsk's vision is to "redefine U.S. tax and accounting fulfilment services" — building a scalable offshore operation handling 90%+ of work, with US team focused on client relationships and complex escalations.</span></div></div>)},
  {id:"departments",label:"Departments",content:()=>(<div><p style={{color:"#9ca3af",fontSize:14,lineHeight:"1.7",marginBottom:16}}>The FL team has <strong style={{color:"#f0f0ff"}}>5 core departments</strong> plus supporting services, each with a Sri Lanka department head.</p>{[{n:"Configuration",o:"Nawanjana",c:C.blue,w:"New customer setup — incorporations (IncFile/MyCorp/Swyft), S-elections (Form 2553), EIN, payroll state registration, amendments, annual renewals.",s:"~1,400 incorporations/yr"},{n:"Accounting",o:"Harsha",c:C.green,w:"Monthly bookkeeping via Hurdlr (replaced Xero). P&L reviews, balance sheet reconciliation, transaction categorization. BOB ratio target: 75 per bookkeeper.",s:"~2,347 subscriptions"},{n:"Business Tax (1120S)",o:"Dhilan",c:C.amber,w:"S-Corp tax return prep and filing. 60% by deadline, 95% by extension. All produced in Sri Lanka.",s:"3→5 preparers"},{n:"Individual Tax (1040)",o:"Shiran / Salinda",c:C.orange,w:"Personal returns (Schedule C/E). Handles KMT and Lettuce customers too. 50% by deadline.",s:"570→950 returns"},{n:"CS Support",o:"Dushini",c:C.purple,w:"Help desk / email / chat. Triages HubSpot tickets into Level 1/2/3. First line of defense for all customer questions.",s:"4-person SL team + US CSMs"}].map((d,i)=>(<div key={i} className="dept-border" style={{borderColor:d.c}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}><span style={{fontWeight:500,fontSize:14}}>{d.n}</span><span className="mono" style={{fontSize:10,color:d.c,letterSpacing:"0.03em"}}>{d.o}</span></div><div style={{fontSize:12,color:"#9ca3af",marginTop:4,lineHeight:"1.6"}}>{d.w}</div><div style={{fontSize:11,color:"#6b7280",marginTop:4}}>{d.s}</div></div>))}<p style={{fontSize:12,color:"#6b7280",marginTop:8}}><strong style={{color:"#9ca3af"}}>Supporting:</strong> Tax Ops (Wajiva), Doc Processing (Wajiva), Controller Support</p></div>)},
  {id:"support",label:"Support tiers",content:()=>(<div><p style={{color:"#9ca3af",fontSize:14,lineHeight:"1.7",marginBottom:16}}>3-tier model: resolve most in SL, escalate complex cases to US CSMs.</p>{[{l:"Level 1 — SL Support",cls:"tier-1",c:C.green,h:"Standard email templates · Account lookups (Gusto, FFM, HubSpot) · WorkNet AI answers · Doc requests (W2, P&L) · Bank status · State renewals · Meeting scheduling",t:"HubSpot, WorkNet AI, Loom"},{l:"Level 2 — CSA Role",cls:"tier-2",c:C.blue,h:"Complex escalations with comments · Upsell identification · HubSpot ↔ AI chat handoffs · Payroll cancellations (TBD) · Billing calls (TBD)",t:"HubSpot, Slack → US CS"},{l:"Level 3 — US CSMs",cls:"tier-4",c:C.red,h:"Tax advisory · Retirement contributions · Complex tax estimates · Cancellations · Account strategy",t:"Direct client meetings, Expert consults"}].map((t,i)=>(<div key={i} className={t.cls} style={{borderRadius:8,padding:"14px 18px",marginBottom:10}}><div style={{fontWeight:500,fontSize:14,color:t.c,marginBottom:6}}>{t.l}</div><div style={{fontSize:12,color:"#9ca3af",lineHeight:"1.7"}}>{t.h}</div><div style={{fontSize:11,color:"#6b7280",marginTop:8}}>Tools: {t.t}</div></div>))}</div>)},
  {id:"escalation",label:"Escalation flow",content:()=>(<div><p style={{color:"#9ca3af",fontSize:14,lineHeight:"1.7",marginBottom:16}}>Escalation is a <strong style={{color:"#f0f0ff"}}>4-step path</strong> with a critical middle layer between SL CS Support and the US team.</p>{[{s:"1",l:"SL CS handles directly",cls:"tier-1",c:C.green,how:"Draft response → Dushini reviews → sends to customer → marks Resolved.",ch:"HubSpot ticket",ex:"Account lookups, doc requests, bank status, state renewals, meeting scheduling, tax status updates, OIL questions"},{s:"2",l:"SL CS + US guidance via Slack",cls:"tier-2",c:C.blue,how:"SL team adds comments to ticket, notifies US CS via Slack for guidance. SL still sends final response.",ch:"HubSpot + Slack to US CS",ex:"Tickets needing specialist knowledge, complex account questions, upsell identification"},{s:"3",l:"FL department escalation via Teams",cls:"tier-3",c:C.purple,how:"Sends acknowledgment to customer (48hr SLA), assigns task via Microsoft Teams to FL dept head.",ch:"Customer email + Teams task",ex:"Accounting → Harsha · 1120S → Dhilan · 1040 → Shiran/Salinda · Config → Nawanjana"},{s:"4",l:"US CSM escalation",cls:"tier-4",c:C.red,how:"Only issues requiring US-based expertise reach CSMs.",ch:"Slack escalation to US CS",ex:"Tax advisory · Retirement contributions · Complex tax estimates · Cancellations · Account strategy"}].map((s,i)=>(<div key={i} className={s.cls} style={{borderRadius:8,padding:"14px 18px",marginBottom:10}}><div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:8}}><span className="step-badge" style={{background:s.c+"1a",color:s.c,border:"1px solid "+s.c+"33"}}>STEP {s.s}</span><span style={{fontWeight:500,fontSize:14,color:s.c}}>{s.l}</span></div><div style={{fontSize:12,color:"#9ca3af",marginBottom:4,lineHeight:"1.6"}}><strong style={{color:"#f0f0ff"}}>How:</strong> {s.how}</div><div style={{fontSize:12,color:"#6b7280",marginBottom:4}}><strong style={{color:"#9ca3af"}}>Channel:</strong> {s.ch}</div><div style={{fontSize:12,color:"#9ca3af",lineHeight:"1.6"}}><strong style={{color:"#f0f0ff"}}>Examples:</strong> {s.ex}</div></div>))}<div className="card" style={{padding:"12px 16px",fontSize:12,color:"#6b7280",lineHeight:"1.6"}}><strong style={{color:"#9ca3af"}}>Comms mapping:</strong> Slack = SL→US · Teams = SL CS→SL FL depts · HubSpot = system of record · Email = customer-facing</div></div>)},
  {id:"pipelines",label:"Pipelines",content:()=>(<div><p style={{color:"#9ca3af",fontSize:14,lineHeight:"1.7",marginBottom:12}}>All work flows through <strong style={{color:"#f0f0ff"}}>HubSpot ticket pipelines</strong>. Each pipeline is a categorized workflow queue — tickets are created based on work type, then move through defined stages.</p>{[{g:"Tax Pipelines",o:"Shiran/Salinda (1040) · Dhilan (1120S)",cls:"tag-tax",items:[{n:"1040 Personal Tax",d:"Individual returns"},{n:"1040 PRO",d:"PRO engagements"},{n:"1120S Business Tax",d:"S-Corp returns"},{n:"1065 Partnership",d:"Partnership returns"},{n:"1120S Only",d:"Business-tax-only"}]},{g:"Accounting Pipelines",o:"Harsha",cls:"tag-acct",items:[{n:"Monthly Accounting",d:"Recurring bookkeeping"},{n:"Hurdlr Migration",d:"Xero to Hurdlr"},{n:"Banking Status",d:"Bank categorization issues"}]},{g:"Configuration Pipelines",o:"Nawanjana + cross-team",cls:"tag-config",items:[{n:"INC - Incorporation",d:"New company formation"},{n:"ELV - Existing LLC",d:"LLC verification + S-election"},{n:"LET - Ad-Hoc Request",d:"Amendments + misc"},{n:"PRO Notice Pipeline",d:"Customer notices (12 stages)"},{n:"Tax Notice (TN)",d:"IRS/state tax notices"},{n:"Payroll Notice (PN)",d:"Payroll notices"},{n:"1099 Pipeline",d:"1099 filings"},{n:"Catch-up Payroll",d:"EOY payroll catch-ups"}]}].map((g,i)=>(<div key={i} className="card" style={{padding:16,marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}><span style={{fontWeight:500,fontSize:14}}>{g.g}</span><span className={"mono step-badge "+g.cls}>{g.o}</span></div>{g.items.map((p,j)=>(<div key={j} className="inner-card" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span className="mono" style={{fontSize:12,fontWeight:500}}>{p.n}</span><span style={{fontSize:11,color:"#6b7280"}}>{p.d}</span></div>))}</div>))}</div>)},
  {id:"daily",label:"Daily ops",content:()=>(<div><p style={{color:"#9ca3af",fontSize:14,lineHeight:"1.7",marginBottom:16}}>Typical day for CS Support in Sri Lanka (US night shift).</p>{[{t:"START",task:"Follow up unresolved requests",d:"Check yesterday's items first. Verify responses sent. Courtesy email if >48hrs."},{t:"MORNING",task:"Review HubSpot tickets",d:"Filter out CSM Review, Platinum, Config, Pro. Draft → Dushini reviews → send. Track in Excel."},{t:"ALL DAY",task:"Monitor live chat",d:"Handle: tax status, docs, OIL, bank, renewals, payroll, meetings. Escalate: retirement, tax estimates, cancellations."},{t:"AS NEEDED",task:"Route escalations",d:"Expertise → Slack US CS. FL escalation → acknowledge (48hr SLA), assign task via Teams."},{t:"END",task:"Update tracking",d:"Excel tracker. Ticket statuses: Resolved / Escalated to FL / Waiting on Us."}].map((s,i)=>(<div key={i} style={{display:"flex",gap:14,marginBottom:16}}><div className="mono" style={{minWidth:80,fontSize:10,fontWeight:500,color:"#6b7280",paddingTop:3,letterSpacing:"0.05em"}}>{s.t}</div><div style={{flex:1,borderLeft:"1px solid rgba(255,255,255,0.06)",paddingLeft:14}}><div style={{fontWeight:500,fontSize:14,marginBottom:2}}>{s.task}</div><div style={{fontSize:12,color:"#9ca3af",lineHeight:"1.6"}}>{s.d}</div></div></div>))}</div>)},
  {id:"lettuce",label:"Lettuce processes",content:()=>(<div><p style={{color:"#9ca3af",fontSize:14,lineHeight:"1.7",marginBottom:16}}>Lettuce is a partner brand. FL handles <strong style={{color:"#f0f0ff"}}>7 key configuration processes</strong>.</p>{[{n:"Incorporation",d:"IncFile (LLCs) or MyCorp (professional). Verify entity name at SOS + address. Save docs in ShareFile, notify Melissa."},{n:"2553 S-Election",d:"New LLCs: Standard 2553, fax to IRS (date = incorporation date). Existing: <75 days → Standard; >75 → 2553+8832 (late)."},{n:"Payroll Setup",d:"State-by-state: Withholding + Unemployment Insurance. WA & AK: email Gusto instead."},{n:"Annual Renewal",d:"CA only until 03/2025 → now all states. Same as Formations minus customer comms."},{n:"Amendments",d:"Name/owner/address/industry via LET pipeline. Check state site → online or paper."},{n:"OA & W-9",d:"Post-incorporation: download IncFile docs → fill OA + W-9 → save to ShareFile."},{n:"Monthly Review",d:"Full QA: P&L, balance sheet, vendor dedup, tax payment accuracy."}].map((p,i)=>(<div key={i} style={{marginBottom:12}}><div style={{fontWeight:500,fontSize:14}}>{p.n}</div><div style={{fontSize:12,color:"#9ca3af",marginTop:3,lineHeight:"1.6"}}>{p.d}</div></div>))}</div>)},
  {id:"tools",label:"Tools",content:()=>(<div><p style={{color:"#9ca3af",fontSize:14,lineHeight:"1.7",marginBottom:16}}>The operation's tech stack.</p>{[{t:"HubSpot",u:"Central CRM + tickets. All pipelines, customer records, workflows."},{t:"Hurdlr",u:"Automated bookkeeping. Replaced Xero. Bank feeds, categorization, P&L."},{t:"Gusto",u:"Payroll. Employee setup, runs, withholding."},{t:"FFM",u:"Customer platform. Onboarding data, doc uploads, profiles."},{t:"ShareFile",u:"Doc storage (being replaced by formations.lettuce.co)."},{t:"IncFile/MyCorp",u:"External incorporation filing services."},{t:"WorkNet AI",u:"Internal knowledge base for CS quick answers."},{t:"Slack/Teams",u:"Comms. Slack for SL→US escalations. Teams for FL tasks."},{t:"SafeSend",u:"Tax return signatures. Automation planned."}].map((t,i)=>(<div key={i} style={{display:"flex",gap:14,marginBottom:8,alignItems:"baseline"}}><span className="mono" style={{minWidth:110,fontSize:12,color:C.cyan,fontWeight:500}}>{t.t}</span><span style={{fontSize:12,color:"#9ca3af",lineHeight:"1.6"}}>{t.u}</span></div>))}</div>)},

ents."},{term:"QA",full:"Quality Assurance",cat:"Operations",detail:"Dushini reviews all CS drafts. Accounting has multi-step monthly checklist."},{term:"BAU",full:"Business As Usual",cat:"Operations",detail:"Steady-state ops after rollout. Target model once SL support is ramped."},{term:"WBR",full:"Weekly Business Review",cat:"Reporting",detail:"Monday report. Part of weekly cadence with OIL List, Pipeline Review, L10 Report."},{term:"L10",full:"Level 10 Meeting (EOS)",cat:"Reporting",detail:"EOS framework weekly meeting. L10 Report produced Wednesdays."},{term:"CCH",full:"CCH (Tax Software)",cat:"Tools & Systems",detail:"Tax preparation software used by the Tax Operations team. First SOP in Tax Ops is CCH Profile/Return Creation."},{term:"POA",full:"Power of Attorney",cat:"Legal / Config",detail:"Tax form (Form 2848) authorizing someone to represent a taxpayer before the IRS. POA Processing is one of the 7 Tax Operations SOPs."},{term:"PRO",full:"Professional / Lettuce Partner Channel",cat:"Pipelines",detail:"Label for the Lettuce-branded customer base that Formations fulfills. PRO pipelines (PRO Notice, PRO New Business Incorporation, 1040 PRO) are specifically for Lettuce partner customers, distinct from Formations direct customers."},{term:"MRR",full:"Monthly Recurring Revenue",cat:"Operations",detail:"Subscription revenue metric. Controller Support (Chamara) maintains MRR records, manages plan changes, and does MRR updates/reconciliation."},{term:"AR",full:"Accounts Receivable",cat:"Operations",detail:"Money owed to the company. Controller Support has an AR Collections Process for outstanding customer payments."}];

setTimeout(() => {const acrData={};glossary.forEach(g=>{acrData[g.term]=g.full+' — '+g.detail;});const acronymPattern=new RegExp('\\b('+Object.keys(acrData).filter(k=>k.length>=2&&k===k.toUpperCase()||['gsk','P&L'].includes(k)).sort((a,b)=>b.length-a.length).join('|').replace('&','&amp;')+')\\b','g');function wrapTextNode(node){if(!node.textContent.match(acronymPattern))return;if(node.parentElement&&(node.parentElement.classList.contains('acr')||node.parentElement.classList.contains('acr-tip')||node.parentElement.tagName==='INPUT'||node.parentElement.tagName==='BUTTON'||node.parentElement.closest('.acr')))return;const text=node.textContent;const parts=[];let lastIdx=0;let match;const re=new RegExp('\\b('+Object.keys(acrData).filter(k=>k.length>=2).sort((a,b)=>b.length-a.length).join('|')+')\\b','g');while((match=re.exec(text))!==null){if(match.index>lastIdx)parts.push(document.createTextNode(text.slice(lastIdx,match.index)));const span=document.createElement('span');span.className='acr';span.textContent=match[1];const tip=document.createElement('span');tip.className='acr-tip';const tipTitle=match[1]+' — '+(glossary.find(g=>g.term===match[1])?.full||'');const tipDetail=glossary.find(g=>g.term===match[1])?.detail||'';tip.innerHTML='<strong>'+tipTitle+'</strong>'+tipDetail;span.appendChild(tip);parts.push(span);lastIdx=re.lastIndex;}if(parts.length===0)return;if(lastIdx<text.length)parts.push(document.createTextNode(text.slice(lastIdx)));const frag=document.createDocumentFragment();parts.forEach(p=>frag.appendChild(p));node.parentNode.replaceChild(frag,node);}function processNode(root){const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode:n=>{if(!n.textContent.trim())return NodeFilter.FILTER_REJECT;if(n.parentElement.closest('.acr'))return NodeFilter.FILTER_REJECT;if(n.parentElement.tagName==='SCRIPT'||n.parentElement.tagName==='STYLE')return NodeFilter.FILTER_REJECT;return NodeFilter.FILTER_ACCEPT;}});const nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);nodes.forEach(wrapTextNode);}processNode(document.getElementById('root'));const observer=new MutationObserver((mutations)=>{mutations.forEach(m=>{m.addedNodes.forEach(n=>{if(n.nodeType===1)processNode(n);});});});observer.observe(document.getElementById('root'),{childList:true,subtree:true});},500);
